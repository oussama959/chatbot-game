<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background:  url('/static/login!.png') no-repeat center center/cover;
      margin: 0;
      padding: 0;
      color: #333;
    }

    .form-container {
      max-width: 400px;
      margin: 50px auto;
      background: transparent;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      color: #13b0d7;
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 30PX;
      font-style: oblique;
      
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #2193b0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #176888;
    }

    p {
      text-align: center;
    }

    a {
      color: #2193b0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: -10px;
      margin-bottom: 10px;
    }
    .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            display: block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="/">Accueil</a>
    <a href="/login-page">Connexion</a>
  </div>
  
  <div class="form-container">
    <h2>Inscription</h2>
    <form id="register-form" method="POST">
      <label for="username">Nom d'utilisateur :</label>
      <input type="text" id="username" name="username" required>

      <label for="email">Adresse email :</label>
      <input type="email" id="email" name="email" required>
      <div id="emailError" class="error"></div>

      <label for="password">Mot de passe :</label>
      <input type="password" id="password" name="password" required>
      <div id="passwordError" class="error"></div>

      <label for="confirmpassword">Confirmer le mot de passe :</label>
      <input type="password" id="confirmpassword" name="confirmpassword" required>
      <div id="confirmError" class="error"></div>

      <button type="submit">S'inscrire</button>
    </form>
    <p>Déjà inscrit ? <a href="/login-page">Connectez-vous ici</a>.</p>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault(); // Empêche l'envoi du formulaire classique

      let valid = true;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmpassword').value;

      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      const confirmError = document.getElementById('confirmError');

      emailError.textContent = "";
      passwordError.textContent = "";
      confirmError.textContent = "";

      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/i;
      if (!emailPattern.test(email)) {
        emailError.textContent = "Adresse email invalide.";
        valid = false;
      }

      if (password.length < 6) {
        passwordError.textContent = "Le mot de passe doit contenir au moins 6 caractères.";
        valid = false;
      }

      if (password !== confirmPassword) {
        confirmError.textContent = "Les mots de passe ne correspondent pas.";
        valid = false;
      }

      if (valid) {
        const response = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            email: email,
            password: password,
            confirmpassword: confirmPassword 
          }),
        });

        const result = await response.json();
        alert(result.message);

        if (result.success) {
          window.location.href = "/login-page";
        }
      } else {
        e.preventDefault(); // Ne pas envoyer le formulaire si validation échoue
      }
    });
  </script>
</body>
</html>
