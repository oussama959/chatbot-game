<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      background: url('/static/login.png') no-repeat center center/cover;
      margin: 0;
      padding: 0;
      height: 100vh;
      color: #333;
    }

    .form-container {
      max-width: 400px;
      margin: 50px auto;
      background: transparent;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      margin-top: 140px;
    }

    h2 {
      text-align: center;
      color: #2193b0;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #2193b0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #176888;
    }

    p {
      text-align: center;
    }

    a {
      color: #2193b0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
    .navbar {
  position: fixed; /* La navbar reste en haut même quand on scroll */
  top: 0;
  left: 0;
  width: 100%;
  background-color: #333;
  overflow: hidden;
  z-index: 1000; /* Toujours au-dessus du reste */
}

.navbar a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.navbar a:hover {
  background-color: #ddd;
  color: black;
}

/* Ajuste aussi le margin-top du formulaire pour qu'il ne soit pas caché par la navbar */
.form-container {
  margin-top: 200px; /* Tu peux ajuster cette valeur si nécessaire */
}
.forgot-password-form {
      display: none;
      max-width: 400px;
      margin: 20px auto;
      background: transparent;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

  </style>
</head>
<body>
  
    <div class="navbar">
      <a href="/">Accueil</a>
      <a href="/register-page">Inscription</a>
  </div>
  
  <div class="form-container">
    <h2>Connexion</h2>
    <form id="form" action="/login" method="POST">
      <label for="username">Nom d'utilisateur :</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Mot de passe :</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Se connecter</button>
    </form>

    <div id="login-message" style="text-align:center; margin-top:10px; color:red;"></div>
    <p>Pas encore inscrit ? <a href="/register-page">Inscrivez-vous ici</a>.</p>
    <p><a href="#" id="forgot-password-link">Mot de passe oublié ?</a></p>
  </div>
  <div class="forgot-password-form" id="forgot-password-form">
    <h2>Récupération du mot de passe</h2>
    <form action="/recover-password" method="POST">
      <label for="email">Entrez votre email :</label>
      <input type="email" id="email" name="email" required>

      <button type="submit">Envoyer un lien de récupération</button>
    </form>
    <p><a href="#" id="back-to-login-link">Retour à la connexion</a></p>
  </div>
  <script>
  
    // Afficher le formulaire de récupération de mot de passe
    document.getElementById('forgot-password-link').addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelector('.form-container').style.display = 'none';  // Cache la page de connexion
      document.getElementById('forgot-password-form').style.display = 'block'; // Affiche le formulaire de récupération
    });

    // Retour à la page de connexion
    document.getElementById('back-to-login-link').addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelector('.form-container').style.display = 'block';  // Affiche de nouveau la page de connexion
      document.getElementById('forgot-password-form').style.display = 'none';  // Cache le formulaire de récupération
    });

    // Gestion du formulaire de récupération de mot de passe
    document.querySelector("#forgot-password-form form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();

      try {
        const response = await fetch("/recover-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (data.success) {
          alert(data.message);
          window.location.href = "/login"; // redirige l'utilisateur après récupération
        } else {
          alert(data.message);
        }
      } catch (err) {
        alert("Erreur lors de la récupération du mot de passe.");
        console.error(err);
      }
    });
    
    document.querySelector("form").addEventListener("submit", async (e) => {
      e.preventDefault(); // Empêche l'envoi classique du formulaire
  
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const messageDiv = document.getElementById("login-message");
  
      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });
  
        const data = await response.json();
  
        if (data.success) {
          messageDiv.style.color = "green"; // vert en cas de succès
          messageDiv.textContent = data.message;
          setTimeout(() => {
          window.location.href = "/index"; // redirection après un petit délai
          }, 1500);
        } else {
          messageDiv.style.color = "red"; // rouge en cas d'erreur
          messageDiv.textContent = data.message;
        }
        } catch (err) {
          messageDiv.style.color = "red";
          messageDiv.textContent = "Erreur lors de la connexion.";
          console.error(err);
        }
      });
  </script>
  
</body>
</html>
